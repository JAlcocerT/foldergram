name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VitePress site
        run: pnpm build:docs

      - name: Publish to foldergram.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.FOLDERGRAM_DOCS_DEPLOY_TOKEN }}
          external_repository: foldergram/foldergram.github.io
          publish_branch: main
          publish_dir: ./docs/.vitepress/dist
          force_orphan: true
